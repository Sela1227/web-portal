<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Sela 系統工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-grad:      linear-gradient(160deg, #EFF4FA 0%, #E4EDF6 100%);
      --card:         #FFFFFF;
      --primary:      #0369A1;
      --primary-mid:  #0284C7;
      --primary-light:#DBEAFE;
      --primary-dark: #075985;
      --text:         #0F172A;
      --text-sub:     #334155;
      --text-muted:   #94A3B8;
      --border:       #DDE5EF;
      --border-inner: #EEF3F9;
      --bg-muted:     #F0F5FB;
      --font:         'Sora', 'Noto Sans TC', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg-grad);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      height: 60px;
      background: rgba(255,255,255,0.94);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 2px 12px rgba(15,23,42,0.05);
    }

    .header-logo {
      height: 36px;
      width: 36px;
      object-fit: contain;
      border-radius: 9px;
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .header-text p {
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-top: 1px;
    }

    /* ── Main ── */
    main {
      padding: 20px 14px 32px;
      max-width: 1080px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Section card ── */
    .section {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .section-header {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border-inner);
      display: flex;
      align-items: center;
      gap: 9px;
      flex-shrink: 0;
      background: linear-gradient(180deg, #FAFCFF 0%, #F4F8FD 100%);
    }

    .section-icon {
      width: 28px;
      height: 28px;
      background: var(--primary-light);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .section-icon svg {
      width: 14px;
      height: 14px;
      stroke: var(--primary);
      stroke-width: 2;
      fill: none;
    }

    .section-title {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-sub);
      letter-spacing: 0.08em;
    }

    /* ── Tool grid ── */
    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      flex: 1;
    }

    .tool-grid > * {
      border-right: 1px solid var(--border-inner);
      border-bottom: 1px solid var(--border-inner);
    }

    .tool-grid > *:nth-child(even)      { border-right: none; }
    .tool-grid > *:nth-last-child(-n+2) { border-bottom: none; }
    .tool-grid > *:only-child           { border-right: none; }

    /* ── Tool card ── */
    .tool-card {
      padding: 28px 12px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
      min-height: 128px;
    }

    .tool-card:active:not(.disabled) {
      background: #EEF6FF;
    }

    .tool-icon-wrap {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.18s, background 0.18s;
    }

    .tool-icon-wrap svg {
      width: 22px;
      height: 22px;
      stroke: var(--primary);
      stroke-width: 1.6;
      fill: none;
    }

    .tool-name {
      font-size: 11px;
      font-weight: 400;
      color: var(--text-sub);
      text-align: center;
      line-height: 1.55;
      letter-spacing: 0.03em;
    }

    /* ── Disabled ── */
    .tool-card.disabled {
      opacity: 0.38;
      filter: grayscale(0.9);
      cursor: default;
      pointer-events: none;
    }

    .dev-badge {
      font-size: 9px;
      color: var(--text-muted);
      background: var(--bg-muted);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.05em;
    }

    /* ── Lock area — fills remaining card space ── */
    .lock-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 20px;
      min-height: 128px;
    }

    .lock-circle {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--primary-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lock-circle svg {
      width: 20px;
      height: 20px;
      stroke: var(--primary);
      stroke-width: 1.75;
      fill: none;
    }

    .lock-label {
      font-size: 11.5px;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }

    .unlock-btn {
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 9px 26px;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 12.5px;
      font-weight: 500;
      letter-spacing: 0.07em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .unlock-btn:active {
      background: var(--primary-dark);
      transform: scale(0.97);
    }

    /* ── Modal overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.48);
      z-index: 200;
      display: none;
      align-items: flex-end;
    }

    .overlay.open {
      display: flex;
      animation: fadeOv 0.2s ease;
    }

    @keyframes fadeOv {
      from { opacity: 0; } to { opacity: 1; }
    }

    .sheet {
      width: 100%;
      background: #fff;
      border-radius: 22px 22px 0 0;
      padding: 10px 24px 48px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideUp 0.3s cubic-bezier(0.32,0.72,0,1);
    }

    @keyframes slideUp {
      from { transform: translateY(100%); } to { transform: translateY(0); }
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 6px auto;
    }

    .sheet-title {
      font-size: 16px;
      font-weight: 500;
      text-align: center;
      letter-spacing: 0.04em;
    }

    .sheet-sub {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -8px;
    }

    .pw-input {
      width: 100%;
      padding: 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: var(--font);
      font-size: 24px;
      color: var(--text);
      background: var(--bg-muted);
      text-align: center;
      letter-spacing: 0.45em;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    .pw-input:focus {
      border-color: var(--primary-mid);
      box-shadow: 0 0 0 3px rgba(3,105,161,0.12);
    }

    .pw-input.shake {
      border-color: #EF4444;
      box-shadow: 0 0 0 3px rgba(239,68,68,0.12);
      animation: shake 0.38s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-9px); }
      40%     { transform: translateX(9px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }

    .pw-error {
      font-size: 12px;
      color: #EF4444;
      text-align: center;
      min-height: 16px;
      margin-top: -6px;
    }

    .confirm-btn {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      padding: 15px;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.06em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .confirm-btn:active { background: var(--primary-dark); }

    .cancel-link {
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 0;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 4px 0 30px;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
    }

    /* ═══ Desktop ≥ 720px ═══ */
    @media (min-width: 720px) {
      header { padding: 0 28px; }
      .header-logo { height: 38px; width: 38px; }
      .header-text h1 { font-size: 15px; }

      main {
        flex-direction: row;
        align-items: stretch;   /* ← all columns same height */
        padding: 28px 24px 44px;
        gap: 12px;
      }

      .section { flex: 1; min-width: 0; }

      .tool-card:hover:not(.disabled) { background: #F3F8FF; }
      .tool-card:hover:not(.disabled) .tool-icon-wrap { transform: translateY(-2px); }

      .unlock-btn:hover { background: var(--primary-dark); }

      .overlay { align-items: center; justify-content: center; }

      .sheet {
        width: 340px;
        border-radius: 18px;
        padding: 28px 28px 32px;
        animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
      }

      @keyframes popIn {
        from { opacity: 0; transform: scale(0.92); }
        to   { opacity: 1; transform: scale(1); }
      }

      .sheet-handle { display: none; }
    }
  </style>
</head>

  };

  function openModal() {
    document.getElementById('overlay').classList.add('open');
    setTimeout(() => document.getElementById('pw').focus(), 300);
  }

  function closeModal() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('pw').value = '';
    document.getElementById('pw-error').textContent = '';
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('overlay')) closeModal();
  }

  async function doConfirm() {
    const input = document.getElementById('pw');
    const err   = document.getElementById('pw-error');
    const pw    = input.value;
    if (!pw) return;
    try {
      const tools = await decrypt(pw, ENCRYPTED);
      closeModal();
      renderPersonal(tools);
    } catch {
      err.textContent = '密碼錯誤，請再試一次';
      input.classList.add('shake');
      input.addEventListener('animationend', () => input.classList.remove('shake'), { once: true });
      input.value = '';
      setTimeout(() => input.focus(), 50);
    }
  }

  async function decrypt(password, b64) {
    const buf  = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const salt = buf.slice(0, 16);
    const iv   = buf.slice(16, 28);
    const body = buf.slice(28);
    const keyMat = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(password),
      { name: 'PBKDF2' }, false, ['deriveKey']
    );
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']
    );
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, body);
    return JSON.parse(new TextDecoder().decode(plain));
  }

  function renderPersonal(tools) {
    const grid = document.getElementById('personal-grid');
    grid.innerHTML = tools.map(t => `
      <a href="${t.url}" class="tool-card" target="_blank" rel="noopener">
        <div class="tool-icon-wrap" style="color:var(--primary)">
          ${ICONS[t.icon] || ICONS.wrench}
        </div>
        <span class="tool-name">${t.name}</span>
      </a>
    `).join('');
    document.getElementById('lock-area').style.display = 'none';
    grid.style.display = 'grid';
  }
</script>
